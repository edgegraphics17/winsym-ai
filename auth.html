<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — winsym.ai Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<style>
:root {
  --black: #1C1917;
  --orange: #C45A1A;
  --orange-bright: #E06820;
  --orange-dim: #7a3010;
  --white: #F5F2EE;
  --gray: #8a8278;
  --gray-dim: #2E2A27;
  --gray-mid: #5a5550;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── LIGHT THEME ── */
[data-theme="light"] {
  --black: #F5F1EB;
  --white: #2C2416;
  --gray: #7A7066;
  --gray-dim: #DDD8CF;
  --gray-mid: #9E9589;
  --orange: #B84F12;
  --orange-bright: #D06018;
  --orange-dim: #C0845A;
}
[data-theme="light"] body { background: #F5F1EB; color: #2C2416; }
[data-theme="light"] .auth-card { background: #F5F1EB; border-color: #DDD8CF; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
[data-theme="light"] .auth-input { background: #FAF8F4; border-color: #DDD8CF; color: #2C2416; }
[data-theme="light"] .auth-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(184,79,18,0.08); }
[data-theme="light"] .auth-label { color: #7A7066; }
[data-theme="light"] .auth-divider { color: #9E9589; }
[data-theme="light"] .auth-divider::before,
[data-theme="light"] .auth-divider::after { background: #DDD8CF; }
[data-theme="light"] .auth-switch { color: #7A7066; }
[data-theme="light"] .back-link { color: #7A7066; }
[data-theme="light"] .back-link:hover { color: #2C2416; }
[data-theme="light"] .nav-bar { background: rgba(245,241,235,0.97); border-bottom-color: rgba(0,0,0,0.06); }
[data-theme="light"] .nav-logo span { color: var(--orange); }

/* ── NAV ── */
.nav-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: 64px;
  background: rgba(28,25,23,0.97);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 3rem;
  backdrop-filter: blur(12px);
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.3rem;
  letter-spacing: 2px;
  color: var(--white);
  text-decoration: none;
}
.nav-logo span { color: var(--orange); }
.back-link {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray);
  text-decoration: none;
  transition: color 0.2s;
}
.back-link:hover { color: var(--white); }

/* ── AUTH LAYOUT ── */
.auth-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 1.5rem 4rem;
}

.auth-card {
  width: 100%;
  max-width: 420px;
  background: #232019;
  border: 1px solid var(--gray-dim);
  padding: 2.5rem;
}

.auth-brand {
  text-align: center;
  margin-bottom: 2rem;
}
.auth-brand-tag {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 0.5rem;
}
.auth-brand-title {
  font-family: var(--font-display);
  font-size: 2rem;
  letter-spacing: 2px;
  color: var(--white);
  line-height: 1;
}

/* ── TABS ── */
.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--gray-dim);
  margin-bottom: 1.75rem;
}
.auth-tab {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray);
  background: none;
  border: none;
  padding: 0.75rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
}
.auth-tab.active { color: var(--white); border-bottom-color: var(--orange); }
.auth-tab:hover:not(.active) { color: var(--white); }

/* ── FORM ── */
.auth-form { display: flex; flex-direction: column; gap: 1.1rem; }
.auth-form-panel { display: none; }
.auth-form-panel.active { display: flex; flex-direction: column; gap: 1.1rem; }

.auth-field { display: flex; flex-direction: column; gap: 0.4rem; }
.auth-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray);
}
.auth-input {
  background: var(--gray-dim);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 300;
  padding: 0.75rem 1rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.auth-input:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(196,90,26,0.12);
}
.auth-input::placeholder { color: var(--gray-mid); }

.auth-btn {
  background: var(--orange);
  color: var(--white);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  border: none;
  padding: 1rem;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  margin-top: 0.25rem;
}
.auth-btn:hover { background: var(--orange-bright); }
.auth-btn:active { transform: scale(0.99); }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── ERROR / SUCCESS ── */
.auth-msg {
  display: none;
  padding: 0.75rem 1rem;
  font-size: 0.85rem;
  font-weight: 400;
  border-left: 3px solid;
}
.auth-msg.error { background: rgba(220,38,38,0.08); border-color: #dc2626; color: #f87171; display: block; }
.auth-msg.success { background: rgba(34,197,94,0.08); border-color: #22c55e; color: #4ade80; display: block; }
[data-theme="light"] .auth-msg.error { background: rgba(220,38,38,0.06); color: #b91c1c; }
[data-theme="light"] .auth-msg.success { background: rgba(34,197,94,0.06); color: #15803d; }

/* ── SWITCH ── */
.auth-switch {
  text-align: center;
  font-size: 0.85rem;
  color: var(--gray);
  margin-top: 1rem;
}
.auth-switch a {
  color: var(--orange);
  text-decoration: none;
  font-weight: 400;
}
.auth-switch a:hover { text-decoration: underline; }

/* ── DIVIDER ── */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 2px;
  color: var(--gray);
  text-transform: uppercase;
  margin: 0.25rem 0;
}
.auth-divider::before, .auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gray-dim);
}

/* ── FOOTER NOTE ── */
.auth-footer-note {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 1px;
  color: var(--gray-mid);
  padding: 2rem;
}

/* ── PASSWORD STRENGTH ── */
.pw-strength {
  display: none;
  height: 3px;
  background: var(--gray-dim);
  margin-top: 0.3rem;
}
.pw-strength-bar {
  height: 100%;
  transition: width 0.3s, background 0.3s;
  width: 0%;
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav-bar">
  <a href="winsymai.html" class="nav-logo">WIN<span>SYM</span>.AI</a>
  <a href="winsymai.html" class="back-link">← Back to home</a>
</nav>

<!-- AUTH CARD -->
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-tag">— Academy Access</div>
      <div class="auth-brand-title">WINSYM.AI</div>
    </div>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="auth-form-panel active" id="panelLogin">
      <div id="loginMsg" class="auth-msg"></div>
      <div class="auth-field">
        <label class="auth-label" for="loginEmail">Email</label>
        <input class="auth-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="loginPassword">Password</label>
        <input class="auth-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="auth-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
      <div class="auth-switch">
        No account? <a href="#" onclick="switchTab('signup'); return false;">Create one free</a>
      </div>
    </div>

    <!-- SIGNUP PANEL -->
    <div class="auth-form-panel" id="panelSignup">
      <div id="signupMsg" class="auth-msg"></div>
      <div class="auth-field">
        <label class="auth-label" for="signupName">Full Name</label>
        <input class="auth-input" type="text" id="signupName" placeholder="Your name" autocomplete="name">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="signupEmail">Email</label>
        <input class="auth-input" type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="signupPassword">Password</label>
        <input class="auth-input" type="password" id="signupPassword" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkPw(this.value)">
        <div class="pw-strength" id="pwStrength"><div class="pw-strength-bar" id="pwBar"></div></div>
      </div>
      <button class="auth-btn" id="signupBtn" onclick="doSignup()">Create Account →</button>
      <div class="auth-switch">
        Already have an account? <a href="#" onclick="switchTab('login'); return false;">Sign in</a>
      </div>
    </div>
  </div>
</div>

<div class="auth-footer-note">Free access · No credit card required · Your progress is saved</div>

<script>
// ── Tab switching ──
function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
  document.getElementById('panelSignup').classList.toggle('active', tab === 'signup');
  clearMessages();
}

function clearMessages() {
  ['loginMsg','signupMsg'].forEach(function(id) {
    var el = document.getElementById(id);
    el.className = 'auth-msg';
    el.textContent = '';
  });
}

function showMsg(id, type, text) {
  var el = document.getElementById(id);
  el.className = 'auth-msg ' + type;
  el.textContent = text;
}

function setLoading(btnId, loading) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(btnId).textContent = loading ? 'Please wait…' : (btnId === 'loginBtn' ? 'Sign In →' : 'Create Account →');
}

// ── Password strength ──
function checkPw(val) {
  var bar = document.getElementById('pwBar');
  var wrap = document.getElementById('pwStrength');
  wrap.style.display = 'block';
  var score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  var pct = (score / 4) * 100;
  var colors = ['#dc2626','#f97316','#eab308','#22c55e'];
  bar.style.width = pct + '%';
  bar.style.background = colors[score - 1] || '#dc2626';
}

// ── Login ──
async function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  if (!email || !password) { showMsg('loginMsg','error','Please fill in all fields.'); return; }
  setLoading('loginBtn', true);
  try {
    await signIn(email, password);
    showMsg('loginMsg','success','Signing you in…');
    var redirect = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html';
    setTimeout(function() { window.location.href = redirect; }, 700);
  } catch(e) {
    showMsg('loginMsg','error', e.message || 'Login failed. Please try again.');
    setLoading('loginBtn', false);
  }
}

// ── Signup ──
async function doSignup() {
  var name = document.getElementById('signupName').value.trim();
  var email = document.getElementById('signupEmail').value.trim();
  var password = document.getElementById('signupPassword').value;
  if (!name || !email || !password) { showMsg('signupMsg','error','Please fill in all fields.'); return; }
  if (password.length < 8) { showMsg('signupMsg','error','Password must be at least 8 characters.'); return; }
  setLoading('signupBtn', true);
  try {
    await signUp(email, password, name);
    showMsg('signupMsg','success','Account created! Check your email to confirm, then sign in.');
    setLoading('signupBtn', false);
  } catch(e) {
    showMsg('signupMsg','error', e.message || 'Signup failed. Please try again.');
    setLoading('signupBtn', false);
  }
}

// ── Enter key support ──
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var loginActive = document.getElementById('panelLogin').classList.contains('active');
  if (loginActive) doLogin();
  else doSignup();
});

// ── If already logged in, redirect ──
(async function() {
  var user = await getUser();
  if (user) {
    var redirect = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html';
    window.location.href = redirect;
  }
  // Check URL for ?tab=signup
  if (new URLSearchParams(window.location.search).get('tab') === 'signup') {
    switchTab('signup');
  }
})();
</script>
</body>
</html>

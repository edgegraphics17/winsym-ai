<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="meta.title">Sign In — winsym.ai Academy</title>
<meta name="description" data-i18n="meta.desc" data-i18n-attr="content" content="Sign in or create a free winsym.ai Academy account. Free access, no credit card required — your course progress is saved.">
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400..600&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<script src="js/i18n.js"></script>
<style>
/* ===== auth.html ===== */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.auth-card{
  width:100%;max-width:440px;background:var(--white);border:1px solid var(--card-border);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:40px;
}
.auth-top{text-align:center;margin-bottom:28px;}
.auth-top .brand-mark{font-family:var(--font-display);font-weight:900;font-size:28px;letter-spacing:-0.02em;}
.auth-top .accent{color:var(--orange);}
.auth-eyebrow{font-family:var(--font-mono);font-size:11.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray-light);margin-top:8px;}
.auth-tabs{display:flex;background:var(--card);border-radius:var(--radius-full);padding:4px;margin-bottom:26px;}
.auth-tab{
  flex:1;border:none;background:none;padding:11px;border-radius:var(--radius-full);cursor:pointer;
  font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--gray);transition:all var(--duration-fast);
}
.auth-tab.active{background:var(--black);color:var(--cream);}
.auth-panel{display:none;}
.auth-panel.active{display:block;}
.auth-msg{font-size:13.5px;margin-bottom:14px;min-height:18px;}
.auth-msg.error{color:var(--danger);}
.auth-msg.success{color:#15803d;}
.pw-strength{display:none;height:5px;border-radius:4px;background:var(--card-border);margin-top:8px;overflow:hidden;}
.pw-bar{height:100%;width:0;transition:width var(--duration-base),background var(--duration-base);}
.auth-foot{text-align:center;font-size:13px;color:var(--gray-light);margin-top:18px;}
.auth-foot a{color:var(--orange);font-weight:600;cursor:pointer;}
.auth-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-light);margin-bottom:24px;}
.auth-back:hover{color:var(--orange);}
.auth-note{text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--gray-light);margin-top:24px;}
.auth-lang{position:absolute;top:20px;right:24px;}
</style>
</head>
<body>

<div class="auth-lang ws-lang-switch">
  <button class="ws-lang-btn" type="button" aria-label="Change language"><span class="ws-lang-btn-text">EN</span></button>
  <div class="ws-lang-menu" role="listbox">
    <button class="ws-lang-option" type="button" data-lang="en" role="option">English<span>EN</span></button>
    <button class="ws-lang-option" type="button" data-lang="de" role="option">Deutsch<span>DE</span></button>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="/" class="auth-back" data-i18n="auth.back">← Back to home</a>
    <div class="auth-top">
      <span class="brand-mark">win<span class="accent">sym</span>.ai</span>
      <h1 class="auth-eyebrow" data-i18n="auth.eyebrow" style="font-weight:inherit;">Academy Access</h1>
    </div>

    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="tabLogin" role="tab" onclick="switchTab('login')" data-i18n="auth.tabLogin">Sign In</button>
      <button class="auth-tab" id="tabSignup" role="tab" onclick="switchTab('signup')" data-i18n="auth.tabSignup">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-panel active" id="panelLogin" role="tabpanel">
      <div class="auth-msg" id="loginMsg"></div>
      <div class="ws-form-group">
        <label class="ws-label" for="loginEmail" data-i18n="auth.email">Email</label>
        <input class="ws-input" type="email" id="loginEmail" autocomplete="email" data-i18n="auth.emailPlaceholder" data-i18n-attr="placeholder" placeholder="you@company.com">
      </div>
      <div class="ws-form-group">
        <label class="ws-label" for="loginPassword" data-i18n="auth.password">Password</label>
        <input class="ws-input" type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="loginBtn" style="width:100%;" onclick="doLogin()" data-i18n="auth.loginBtn">Sign In →</button>
      <div class="auth-foot"><span data-i18n="auth.noAccount">No account?</span> <a href="#" role="button" onclick="switchTab('signup');return false;" data-i18n="auth.createOne">Create one free</a></div>
    </div>

    <!-- SIGNUP -->
    <div class="auth-panel" id="panelSignup" role="tabpanel">
      <div class="auth-msg" id="signupMsg"></div>
      <div class="ws-form-group">
        <label class="ws-label" for="signupName" data-i18n="auth.fullName">Full Name</label>
        <input class="ws-input" type="text" id="signupName" autocomplete="name" data-i18n="auth.namePlaceholder" data-i18n-attr="placeholder" placeholder="Your name">
      </div>
      <div class="ws-form-group">
        <label class="ws-label" for="signupEmail" data-i18n="auth.email">Email</label>
        <input class="ws-input" type="email" id="signupEmail" autocomplete="email" data-i18n="auth.emailPlaceholder" data-i18n-attr="placeholder" placeholder="you@company.com">
      </div>
      <div class="ws-form-group">
        <label class="ws-label" for="signupPassword" data-i18n="auth.password">Password</label>
        <input class="ws-input" type="password" id="signupPassword" autocomplete="new-password" oninput="checkPw(this.value)" placeholder="••••••••">
        <div class="pw-strength" id="pwStrength"><div class="pw-bar" id="pwBar"></div></div>
      </div>
      <button class="btn btn-primary" id="signupBtn" style="width:100%;" onclick="doSignup()" data-i18n="auth.signupBtn">Create Account →</button>
      <div class="auth-foot"><span data-i18n="auth.haveAccount">Already have an account?</span> <a href="#" role="button" onclick="switchTab('login');return false;" data-i18n="auth.signIn">Sign in</a></div>
    </div>

    <div class="auth-note" data-i18n="auth.note">Free access · No credit card required · Your progress is saved</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
/* i18n-aware strings for JS messages */
function T(key, fallback){
  var lang = (window.winsymI18n && window.winsymI18n.getLanguage && window.winsymI18n.getLanguage()) || 'en';
  var dict = (window.I18N && window.I18N[lang]) || {};
  return (key in dict) ? dict[key] : fallback;
}

function switchTab(tab){
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabSignup').classList.toggle('active', tab==='signup');
  document.getElementById('panelLogin').classList.toggle('active', tab==='login');
  document.getElementById('panelSignup').classList.toggle('active', tab==='signup');
  clearMessages();
}
function clearMessages(){
  ['loginMsg','signupMsg'].forEach(function(id){var el=document.getElementById(id);el.className='auth-msg';el.textContent='';});
}
function showMsg(id,type,text){var el=document.getElementById(id);el.className='auth-msg '+type;el.textContent=text;}
function setLoading(btnId,loading){
  var btn=document.getElementById(btnId);
  btn.disabled=loading;
  if(loading){btn.textContent=T('auth.pleaseWait','Please wait…');}
  else{btn.textContent=(btnId==='loginBtn')?T('auth.loginBtn','Sign In →'):T('auth.signupBtn','Create Account →');}
}
function checkPw(val){
  var bar=document.getElementById('pwBar'),wrap=document.getElementById('pwStrength');
  wrap.style.display='block';
  var score=0;
  if(val.length>=8)score++;
  if(/[A-Z]/.test(val))score++;
  if(/[0-9]/.test(val))score++;
  if(/[^A-Za-z0-9]/.test(val))score++;
  var colors=['#dc2626','#f97316','#eab308','#22c55e'];
  bar.style.width=(score/4*100)+'%';
  bar.style.background=colors[score-1]||'#dc2626';
}
async function doLogin(){
  var email=document.getElementById('loginEmail').value.trim();
  var password=document.getElementById('loginPassword').value;
  if(!email||!password){showMsg('loginMsg','error',T('auth.errFields','Please fill in all fields.'));return;}
  setLoading('loginBtn',true);
  try{
    await signIn(email,password);
    showMsg('loginMsg','success',T('auth.signingIn','Signing you in…'));
    var redirect=new URLSearchParams(window.location.search).get('redirect')||'dashboard.html';
    setTimeout(function(){window.location.href=redirect;},700);
  }catch(e){
    showMsg('loginMsg','error',e.message||T('auth.errLogin','Login failed. Please try again.'));
    setLoading('loginBtn',false);
  }
}
async function doSignup(){
  var name=document.getElementById('signupName').value.trim();
  var email=document.getElementById('signupEmail').value.trim();
  var password=document.getElementById('signupPassword').value;
  if(!name||!email||!password){showMsg('signupMsg','error',T('auth.errFields','Please fill in all fields.'));return;}
  if(password.length<8){showMsg('signupMsg','error',T('auth.errPwLen','Password must be at least 8 characters.'));return;}
  setLoading('signupBtn',true);
  try{
    await signUp(email,password,name);
    showMsg('signupMsg','success',T('auth.created','Account created! Check your email to confirm, then sign in.'));
    setLoading('signupBtn',false);
  }catch(e){
    showMsg('signupMsg','error',e.message||T('auth.errSignup','Signup failed. Please try again.'));
    setLoading('signupBtn',false);
  }
}
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  if(document.getElementById('panelLogin').classList.contains('active'))doLogin();else doSignup();
});
/* keep button labels correct after a language switch */
document.addEventListener('winsym:langchange',function(){
  setLoading('loginBtn',false);setLoading('signupBtn',false);
});
(async function(){
  if(window.getUser){
    try{
      var user=await getUser();
      if(user){var r=new URLSearchParams(window.location.search).get('redirect')||'dashboard.html';window.location.href=r;}
    }catch(e){}
  }
  if(new URLSearchParams(window.location.search).get('tab')==='signup')switchTab('signup');
})();
</script>

<script>
window.I18N = window.I18N || {};
window.I18N.de = Object.assign({}, window.I18N.de, {
  'meta.title': 'Anmelden — winsym.ai Academy',
  'meta.desc': 'Melden Sie sich an oder erstellen Sie ein kostenloses winsym.ai-Academy-Konto. Kostenloser Zugang, keine Kreditkarte nötig — Ihr Kursfortschritt wird gespeichert.',
  'auth.back': '← Zurück zur Startseite',
  'auth.eyebrow': 'Academy-Zugang',
  'auth.tabLogin': 'Anmelden', 'auth.tabSignup': 'Konto erstellen',
  'auth.email': 'E-Mail', 'auth.emailPlaceholder': 'sie@unternehmen.com',
  'auth.password': 'Passwort',
  'auth.fullName': 'Vollständiger Name', 'auth.namePlaceholder': 'Ihr Name',
  'auth.loginBtn': 'Anmelden →', 'auth.signupBtn': 'Konto erstellen →',
  'auth.noAccount': 'Noch kein Konto?', 'auth.createOne': 'Kostenlos erstellen',
  'auth.haveAccount': 'Schon ein Konto?', 'auth.signIn': 'Anmelden',
  'auth.note': 'Kostenloser Zugang · Keine Kreditkarte nötig · Ihr Fortschritt wird gespeichert',
  'auth.pleaseWait': 'Bitte warten…',

  'auth.signingIn': 'Sie werden angemeldet…',
  'auth.errLogin': 'Anmeldung fehlgeschlagen. Bitte erneut versuchen.',
  'auth.created': 'Konto erstellt! Bestätigen Sie Ihre E-Mail und melden Sie sich dann an.',

</script>
</body>
</html>

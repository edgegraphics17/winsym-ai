<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Input — winsym.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--color-bg:#1C1917;--color-bg-raised:#232019;--color-text:#F5F2EE;--color-text-muted:#8a8278;--color-text-dim:#5a5550;--color-border:#2E2A27;--color-border-mid:#5a5550;--color-orange:#C45A1A;--color-orange-faint:rgba(196,90,26,.08);--color-danger:#f87171;--color-danger-dim:rgba(248,113,113,.1);--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);font-weight:300;padding:32px;-webkit-font-smoothing:antialiased}
.group-label{font-family:var(--font-mono);font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;margin-bottom:32px}
.ws-form-group{display:flex;flex-direction:column;gap:8px}
.ws-label{font-family:var(--font-mono);font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--color-text-muted)}
.ws-input{width:100%;background:var(--color-bg-raised);border:1px solid var(--color-border);color:var(--color-text);font-family:var(--font-body);font-size:1rem;font-weight:300;padding:12px 16px;min-height:48px;transition:border-color 150ms ease,box-shadow 150ms ease;outline:none;border-radius:2px}
.ws-input::placeholder{color:var(--color-text-dim)}
.ws-input:focus{border-color:var(--color-orange);box-shadow:0 0 0 3px var(--color-orange-faint)}
.ws-input-error{border-color:var(--color-danger);box-shadow:0 0 0 3px var(--color-danger-dim)}
.ws-input:disabled{opacity:.45;cursor:not-allowed}
.ws-helper{font-size:0.75rem;color:var(--color-text-muted)}
.ws-error-msg{font-size:0.75rem;color:var(--color-danger)}
/* Button inline */
.btn-primary{display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:0.55rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;padding:12px 24px;background:var(--color-orange);color:#1C1917;border:1px solid var(--color-orange);cursor:pointer;min-height:48px;transition:background 150ms ease}
.btn-primary:hover{background:#E06820}
</style>
</head>
<body>

<div class="group-label">Form States</div>
<div class="form-grid">

  <div class="ws-form-group">
    <label class="ws-label" for="name">Full Name <span style="color:#f87171">*</span></label>
    <input class="ws-input" id="name" type="text" placeholder="Karim Azzaoui">
    <span class="ws-helper">Your name as it appears on your business card.</span>
  </div>

  <div class="ws-form-group">
    <label class="ws-label" for="email">Email Address <span style="color:#f87171">*</span></label>
    <input class="ws-input" id="email" type="email" value="karim@winsym.ai" style="border-color:var(--color-orange);box-shadow:0 0 0 3px var(--color-orange-faint)">
    <span class="ws-helper">Focused state shown above.</span>
  </div>

  <div class="ws-form-group">
    <label class="ws-label" for="company">Company</label>
    <input class="ws-input ws-input-error" id="company" type="text" value="Winsym" placeholder="Your Company">
    <span class="ws-error-msg">Company name must be at least 3 characters.</span>
  </div>

  <div class="ws-form-group">
    <label class="ws-label" for="msg-disabled">Phone Number</label>
    <input class="ws-input" id="msg-disabled" type="tel" placeholder="+60 112 4487055" disabled>
    <span class="ws-helper">Disabled state — not editable.</span>
  </div>

</div>

<div class="group-label">Auth Form (compact)</div>
<div style="max-width:360px">
  <div class="ws-form-group" style="margin-bottom:16px">
    <label class="ws-label" for="auth-email">Email</label>
    <input class="ws-input" id="auth-email" type="email" placeholder="you@company.com">
  </div>
  <div class="ws-form-group" style="margin-bottom:20px">
    <label class="ws-label" for="auth-pass">Password</label>
    <input class="ws-input" id="auth-pass" type="password" placeholder="••••••••">
  </div>
  <button class="btn-primary" style="width:100%">Sign In to Academy</button>
</div>

</body>
</html>

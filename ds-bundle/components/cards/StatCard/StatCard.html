<!-- @dsCard group="Cards" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stat Card — winsym.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--color-bg:#1C1917;--color-bg-raised:#232019;--color-text:#F5F2EE;--color-text-muted:#8a8278;--color-border:#2E2A27;--color-orange:#C45A1A;--color-success:#22c55e;--font-display:'Bebas Neue',sans-serif;--font-mono:'DM Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);color:var(--color-text);padding:32px;-webkit-font-smoothing:antialiased}
.group-label{font-family:var(--font-mono);font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:14px}

/* Stats row — 1px gap creates separator */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--color-border);border:1px solid var(--color-border);margin-bottom:32px}
.ws-stat-card{background:var(--color-bg);padding:24px 32px}
.ws-stat-num{font-family:var(--font-display);font-size:2rem;color:var(--color-orange);letter-spacing:1px;line-height:1}
.ws-stat-label{font-family:var(--font-mono);font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--color-text-muted);margin-top:4px}

/* Standalone stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:32px}
.stat-card-standalone{background:var(--color-bg-raised);border:1px solid var(--color-border);padding:20px 24px}
.stat-card-standalone .ws-stat-num{font-size:2.5rem}
.stat-green .ws-stat-num{color:var(--color-success)}

.color-bg-raised{background:var(--color-bg-raised)}
</style>
</head>
<body>

<div class="group-label">Stats Row (dashboard variant — grid with 1px separator)</div>
<div class="stats-row">
  <div class="ws-stat-card">
    <div class="ws-stat-num">3</div>
    <div class="ws-stat-label">Courses Enrolled</div>
  </div>
  <div class="ws-stat-card">
    <div class="ws-stat-num">67%</div>
    <div class="ws-stat-label">Avg. Progress</div>
  </div>
  <div class="ws-stat-card">
    <div class="ws-stat-num">1</div>
    <div class="ws-stat-label">Certificates Earned</div>
  </div>
</div>

<div class="group-label">Standalone Stat Cards</div>
<div class="stat-grid">
  <div class="stat-card-standalone">
    <div class="ws-stat-num">8×</div>
    <div class="ws-stat-label">Company Brain clients to 100K</div>
  </div>
  <div class="stat-card-standalone stat-green">
    <div class="ws-stat-num">30</div>
    <div class="ws-stat-label">Days to deploy</div>
  </div>
  <div class="stat-card-standalone">
    <div class="ws-stat-num">5</div>
    <div class="ws-stat-label">Phase method</div>
  </div>
  <div class="stat-card-standalone">
    <div class="ws-stat-num">MYR<br>12K</div>
    <div class="ws-stat-label">Per engagement</div>
  </div>
</div>

</body>
</html>

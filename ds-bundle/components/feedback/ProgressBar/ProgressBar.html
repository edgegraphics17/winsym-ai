<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Bar — winsym.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--color-bg:#1C1917;--color-bg-raised:#232019;--color-text:#F5F2EE;--color-text-muted:#8a8278;--color-border:#2E2A27;--color-orange:#C45A1A;--color-success:#22c55e;--font-display:'Bebas Neue',sans-serif;--font-mono:'DM Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);color:var(--color-text);padding:32px;-webkit-font-smoothing:antialiased}
.group{margin-bottom:28px}
.group-label{font-family:var(--font-mono);font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:16px}
.progress-row{margin-bottom:20px}
.progress-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.progress-name{font-family:var(--font-mono);font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--color-text-muted)}
.progress-pct{font-family:var(--font-display);font-size:1rem;color:var(--color-orange);letter-spacing:1px}
.progress-pct.green{color:var(--color-success)}
.ws-progress{width:100%;height:5px;background:rgba(255,255,255,.10);overflow:hidden}
.ws-progress-fill{height:100%;background:var(--color-success);transition:width .8s ease}
.ws-progress-fill.orange{background:var(--color-orange)}

/* Course card progress example */
.course-demo{background:var(--color-bg-raised);border:1px solid var(--color-border);overflow:hidden;margin-bottom:12px}
.course-thumb{height:80px;background:#080808;display:flex;align-items:center;padding:0 20px;position:relative}
.course-num{font-family:var(--font-display);font-size:4rem;color:rgba(255,255,255,.07);position:absolute;right:12px;bottom:-8px}
.course-thumb-bar{position:absolute;bottom:0;left:0;right:0;height:5px;background:rgba(255,255,255,.12)}
.course-thumb-fill{height:100%;transition:width .8s ease}
.course-body{padding:14px 16px}
.course-title{font-family:var(--font-display);font-size:1.1rem;letter-spacing:2px;margin-bottom:4px}
.course-meta{font-family:var(--font-mono);font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--color-text-muted)}
</style>
</head>
<body>

<div class="group">
  <div class="group-label">Progress Bar — Green (course completion)</div>
  <div class="progress-row">
    <div class="progress-header">
      <span class="progress-name">AI Foundations</span>
      <span class="progress-pct green">100%</span>
    </div>
    <div class="ws-progress"><div class="ws-progress-fill" style="width:100%"></div></div>
  </div>
  <div class="progress-row">
    <div class="progress-header">
      <span class="progress-name">Company Brain Masterclass</span>
      <span class="progress-pct green">65%</span>
    </div>
    <div class="ws-progress"><div class="ws-progress-fill" style="width:65%"></div></div>
  </div>
  <div class="progress-row">
    <div class="progress-header">
      <span class="progress-name">Advanced Prompt Engineering</span>
      <span class="progress-pct">20%</span>
    </div>
    <div class="ws-progress"><div class="ws-progress-fill orange" style="width:20%"></div></div>
  </div>
  <div class="progress-row">
    <div class="progress-header">
      <span class="progress-name">AI for Leaders</span>
      <span class="progress-pct">0%</span>
    </div>
    <div class="ws-progress"><div class="ws-progress-fill orange" style="width:0%"></div></div>
  </div>
</div>

<div class="group">
  <div class="group-label">In Course Card Thumbnail</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">
    <div class="course-demo">
      <div class="course-thumb">
        <div class="course-num">01</div>
        <div class="course-thumb-bar"><div class="course-thumb-fill" style="width:100%;background:var(--color-success)"></div></div>
      </div>
      <div class="course-body">
        <div class="course-title">AI Foundations</div>
        <div class="course-meta">Complete · 6 modules</div>
      </div>
    </div>
    <div class="course-demo">
      <div class="course-thumb">
        <div class="course-num">02</div>
        <div class="course-thumb-bar"><div class="course-thumb-fill" style="width:65%;background:var(--color-orange)"></div></div>
      </div>
      <div class="course-body">
        <div class="course-title">Company Brain</div>
        <div class="course-meta">In Progress · Module 4 of 8</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>

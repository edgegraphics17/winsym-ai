<!-- @dsCard group="Badges" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badge — winsym.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--color-bg:#1C1917;--color-bg-raised:#232019;--color-text:#F5F2EE;--color-text-muted:#8a8278;--color-text-dim:#5a5550;--color-border:#2E2A27;--color-orange:#C45A1A;--color-orange-dim:#7a3010;--color-orange-faint:rgba(196,90,26,.08);--color-success:#22c55e;--color-success-dim:rgba(34,197,94,.1);--color-danger:#f87171;--color-danger-dim:rgba(248,113,113,.1);--font-mono:'DM Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);color:var(--color-text);padding:32px;-webkit-font-smoothing:antialiased}
.group{margin-bottom:28px}
.group-label{font-family:var(--font-mono);font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:14px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ws-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:0.55rem;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border:1px solid;line-height:1.4}
.ws-badge-orange{color:var(--color-orange);border-color:var(--color-orange-dim);background:var(--color-orange-faint)}
.ws-badge-success{color:var(--color-success);border-color:var(--color-success);background:var(--color-success-dim)}
.ws-badge-muted{color:var(--color-text-muted);border-color:var(--color-border);background:transparent}
.ws-badge-danger{color:var(--color-danger);border-color:var(--color-danger);background:var(--color-danger-dim)}

/* Context demo */
.demo-row{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--color-border);font-size:0.85rem;color:var(--color-text-muted)}
.demo-row:last-child{border-bottom:none}
</style>
</head>
<body>

<div class="group">
  <div class="group-label">Badge Variants</div>
  <div class="row">
    <span class="ws-badge ws-badge-orange">New</span>
    <span class="ws-badge ws-badge-orange">Company Brain</span>
    <span class="ws-badge ws-badge-success">Complete</span>
    <span class="ws-badge ws-badge-success">Free</span>
    <span class="ws-badge ws-badge-muted">Coming Soon</span>
    <span class="ws-badge ws-badge-muted">Draft</span>
    <span class="ws-badge ws-badge-danger">Expired</span>
  </div>
</div>

<div class="group">
  <div class="group-label">In Context — Course Cards</div>
  <div class="demo-row">
    <span class="ws-badge ws-badge-success">Free</span>
    AI Foundations — Module 1
  </div>
  <div class="demo-row">
    <span class="ws-badge ws-badge-orange">New</span>
    Company Brain Masterclass
  </div>
  <div class="demo-row">
    <span class="ws-badge ws-badge-muted">Coming Soon</span>
    Advanced Prompt Engineering
  </div>
  <div class="demo-row">
    <span class="ws-badge ws-badge-success">Complete</span>
    AI for Non-Technical Leaders
  </div>
</div>

</body>
</html>

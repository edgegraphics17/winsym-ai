<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI Content Mastery — interactive quiz by winsym.ai">
<title>AI Content Mastery · Quiz · winsym.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#C45A1A; --orange-soft:#E07B3C;
  --ink:#1C1917; --ink-2:#262220;
  --cream:#F5F2EE; --cream-2:#ece6dd;
  --rose:#D295AC;
  --green:#3F8F5B; --green-bg:#1f3327;
  --red:#C2473B; --red-bg:#331f1d;
  --grey:#9a948c;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'DM Sans',-apple-system,Segoe UI,Helvetica,Arial,sans-serif;
  background:var(--ink);
  color:var(--cream);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.bebas{font-family:'Bebas Neue',Impact,sans-serif;letter-spacing:.02em;}
.mono{font-family:'DM Mono',monospace;}

/* ambient background accents */
.bg-orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.16;z-index:0;pointer-events:none;}
.orb1{width:520px;height:520px;background:var(--orange);top:-180px;right:-120px;}
.orb2{width:460px;height:460px;background:var(--rose);bottom:-200px;left:-160px;opacity:.10;}

.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* top bar */
header{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;}
.brand{display:flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--cream);}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--orange);}
.tagchip{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);}

/* progress */
.progress-shell{padding:0 28px;}
.progress-track{height:5px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--orange),var(--orange-soft));border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1);}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{width:100%;max-width:780px;}

/* ---------- START SCREEN ---------- */
.start{text-align:center;}
.start .kicker{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--orange);margin-bottom:18px;}
.start h1{font-size:clamp(52px,11vw,108px);line-height:.92;color:var(--cream);}
.start h1 .o{color:var(--orange);}
.start .sub{font-size:clamp(16px,2.4vw,20px);color:#cfc9c1;max-width:540px;margin:20px auto 0;line-height:1.5;}
.start .meta{margin-top:30px;display:flex;gap:30px;justify-content:center;flex-wrap:wrap;}
.start .meta div{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;color:var(--grey);}
.start .meta b{display:block;font-family:'Bebas Neue';font-size:34px;color:var(--cream);letter-spacing:.03em;}

/* buttons */
.btn{
  font-family:'DM Mono',monospace;font-size:14px;letter-spacing:.1em;text-transform:uppercase;
  background:var(--orange);color:#fff;border:none;border-radius:99px;
  padding:17px 38px;cursor:pointer;transition:transform .15s ease,background .2s ease,box-shadow .2s;
  box-shadow:0 10px 30px -10px rgba(196,90,26,.7);
}
.btn:hover{background:var(--orange-soft);transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn.ghost{background:transparent;color:var(--cream);border:1px solid rgba(255,255,255,.22);box-shadow:none;}
.btn.ghost:hover{border-color:var(--orange);color:var(--orange-soft);background:transparent;}
.btn:disabled{opacity:.32;cursor:not-allowed;transform:none;box-shadow:none;}
.start .btn{margin-top:38px;padding:19px 52px;font-size:15px;}

/* ---------- QUESTION SCREEN ---------- */
.qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.qcount{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.14em;color:var(--grey);text-transform:uppercase;}
.qseg{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--orange);text-transform:uppercase;border:1px solid rgba(196,90,26,.4);border-radius:99px;padding:5px 12px;}
.qtext{font-size:clamp(24px,3.6vw,34px);line-height:1.18;color:var(--cream);font-weight:700;margin-bottom:26px;}

.options{display:flex;flex-direction:column;gap:13px;}
.opt{
  display:flex;align-items:center;gap:16px;
  background:var(--ink-2);border:1.5px solid rgba(255,255,255,.09);
  border-radius:14px;padding:17px 20px;cursor:pointer;text-align:left;
  transition:border-color .18s,background .18s,transform .12s;color:var(--cream);
  font-size:17px;line-height:1.35;width:100%;font-family:inherit;
}
.opt:hover:not(.locked){border-color:var(--orange);transform:translateX(3px);}
.opt .key{
  flex:0 0 34px;height:34px;border-radius:9px;background:rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue';font-size:19px;letter-spacing:.04em;color:var(--cream);transition:all .18s;
}
.opt .txt{flex:1;}
.opt .mark{flex:0 0 auto;font-family:'DM Mono';font-size:13px;opacity:0;transition:opacity .2s;}
.options.locked .opt{cursor:default;}
.opt.correct{border-color:var(--green);background:var(--green-bg);}
.opt.correct .key{background:var(--green);color:#fff;}
.opt.correct .mark{opacity:1;color:#8fd6a6;}
.opt.wrong{border-color:var(--red);background:var(--red-bg);}
.opt.wrong .key{background:var(--red);color:#fff;}
.opt.wrong .mark{opacity:1;color:#e8a59d;}
.opt.dim{opacity:.5;}

/* explanation */
.explain{
  margin-top:20px;background:var(--cream);color:var(--ink);border-radius:14px;
  padding:20px 22px;border-left:4px solid var(--orange);
  max-height:0;opacity:0;overflow:hidden;transform:translateY(8px);
  transition:max-height .5s ease,opacity .4s ease,transform .4s ease;
}
.explain.show{max-height:420px;opacity:1;transform:translateY(0);}
.explain .et{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.explain .verdict{font-weight:700;}
.explain p{font-size:15.5px;line-height:1.55;}
.explain .ref{margin-top:10px;font-family:'DM Mono',monospace;font-size:12px;color:#8a847b;letter-spacing:.03em;}

.nav{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:14px;}
.hint{font-family:'DM Mono',monospace;font-size:12px;color:var(--grey);letter-spacing:.04em;}

/* ---------- RESULTS ---------- */
.results{text-align:center;}
.results .kicker{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--orange);margin-bottom:14px;}
.score-ring{position:relative;width:200px;height:200px;margin:8px auto 4px;}
.scorenum{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.scorenum b{font-family:'Bebas Neue';font-size:74px;line-height:.8;color:var(--cream);}
.scorenum span{font-family:'DM Mono';font-size:12px;letter-spacing:.14em;color:var(--grey);text-transform:uppercase;margin-top:4px;}
.results h2{font-size:clamp(34px,6vw,56px);color:var(--cream);margin-top:14px;}
.results h2 .o{color:var(--orange);}
.results .verdict-line{color:#cfc9c1;font-size:18px;max-width:480px;margin:14px auto 0;line-height:1.5;}
.results .cta-box{margin-top:34px;background:var(--ink-2);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:26px;max-width:540px;margin-left:auto;margin-right:auto;}
.results .cta-box .bebas{font-size:26px;color:var(--cream);}
.results .cta-box p{color:#cfc9c1;font-size:15px;margin:8px 0 18px;line-height:1.5;}
.results .btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:30px;}

footer{text-align:center;padding:18px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:#5e5852;text-transform:uppercase;}

.fade{animation:fade .45s ease;}
@keyframes fade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:560px){
  header{padding:16px 18px;}
  .progress-shell{padding:0 18px;}
  .opt{font-size:15.5px;padding:15px 16px;}
  .nav{flex-direction:column-reverse;align-items:stretch;}
  .nav .btn{width:100%;text-align:center;}
  .hint{text-align:center;}
}
</style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="wrap">
  <header>
    <div class="brand"><span class="dot"></span> winsym.ai</div>
    <div class="tagchip">AI Content Mastery</div>
  </header>

  <div class="progress-shell"><div class="progress-track"><div class="progress-fill" id="bar"></div></div></div>

  <main>
    <div class="card" id="screen"></div>
  </main>

  <footer>winsym.ai · Winning Systems, Backed by AI</footer>
</div>

<script>
const QUESTIONS = [
  {
    seg:"Segment 1 · Setup",
    q:"What is MCP, in one line?",
    options:[
      "A new AI model that replaces Claude",
      "The cable between Claude's brain and Higgsfield's hands",
      "A video file format for Reels",
      "A paid Higgsfield subscription tier"
    ],
    correct:1,
    explain:"MCP connects the thinking (Claude decides what to make) to the making (Higgsfield generates it). You connect once, then direct an entire studio in plain English.",
    ref:"Segment 1 · Set up the studio"
  },
  {
    seg:"The core idea",
    q:"What is the single sentence that runs the whole system?",
    options:[
      "Content is king, distribution is queen",
      "Move fast and break things",
      "AI gives you average — unless you give it a brain",
      "The best camera is the one you have with you"
    ],
    correct:2,
    explain:"Everything proves this. You paste the brand brief once, and from then on every output is on-brand. The brand brief IS the brain.",
    ref:"Golden rules"
  },
  {
    seg:"Segment 1 · Setup",
    q:"Before you generate ANYTHING, what's the most important step?",
    options:[
      "Pick the highest resolution available",
      "Paste and pin your brand brief",
      "Buy more Higgsfield credits",
      "Choose a trending audio track"
    ],
    correct:1,
    explain:"Load the brain first. A briefed tool stays on-brand; an un-briefed tool is a slot machine. This is the fix for Mistake #1.",
    ref:"Prompt P0.1"
  },
  {
    seg:"Segment 1 · Setup",
    q:"Which permission setting should you AVOID, and why?",
    options:[
      "\"Ask / confirm\" — it's too slow",
      "\"Read-only\" — it blocks generation",
      "\"Always Allow\" — it burns credits with silent runaway generations",
      "\"Offline mode\" — it disables MCP"
    ],
    correct:2,
    explain:"\"Always Allow\" lets generations fire silently and quietly burn your credits. Keep it on ask/confirm. This is Mistake #3 — the planted lesson.",
    ref:"Segment 1 · the permission trap"
  },
  {
    seg:"Segment 2 · The models",
    q:"You need a clean studio PRODUCT PHOTO. Which tool?",
    options:["Marketing Studio","Nano Banana Pro","Seedance 2.0","Cinema Studio"],
    correct:1,
    explain:"Nano Banana Pro wins on clean product shots. Its weakness is heavy text on the image — for that you'd switch to GPT Image 2.",
    ref:"Segment 2 · the model map"
  },
  {
    seg:"Segment 2 · The models",
    q:"You want an ad creative with the HEADLINE baked onto the image. Which tool?",
    options:["GPT Image 2","Nano Banana Pro","Seedance 2.0","Cinema Studio"],
    correct:0,
    explain:"GPT Image 2 is best when you need text on the image. Keep the copy short — long paragraphs still get mangled.",
    ref:"Segment 2 · the model map"
  },
  {
    seg:"Segment 2 · The models",
    q:"Which tool is built for authentic, UGC-style talking video (the style that converts highest)?",
    options:["Cinema Studio","Nano Banana Pro","Marketing Studio","GPT Image 2"],
    correct:2,
    explain:"Marketing Studio (powered by Seedance) makes UGC formats and even has URL-to-video. UGC is the format that converts — keep it authentic, not over-produced.",
    ref:"Segment 2 · the model map"
  },
  {
    seg:"Segment 3 · One-prompt brand",
    q:"The 'one prompt' brand build produces how many finished assets in a single pass?",
    options:["3 assets","9 assets","30 assets","100 assets"],
    correct:1,
    explain:"3 products × (1 product photo + 1 ad creative + 1 UGC video) = 9 assets — plus market research, positioning and a product line. All from one prompt.",
    ref:"Prompt P4.1"
  },
  {
    seg:"Segment 3 · One-prompt brand",
    q:"Same tool, two different results. What turns generic slop into on-brand output?",
    options:[
      "Paying for a higher tier",
      "The brand brief + a reference image",
      "Running it at 4 a.m. when servers are free",
      "Using more emojis in the prompt"
    ],
    correct:1,
    explain:"Same tool. The only difference is the brain (the brief) and a reference image of the real product. That's the whole game.",
    ref:"Prompt P4.2 · the consistency contrast"
  },
  {
    seg:"Segment 4 · Video",
    q:"What is the #1 rule of the video prompt formula?",
    options:[
      "Always ask for 4K",
      "Pack as many actions as possible into one shot",
      "One clear action per shot",
      "Never specify the lighting"
    ],
    correct:2,
    explain:"One clear action per shot. Multiple actions in one prompt = mush. Stack specific modifiers instead: model + shot + ONE action + light + lens + grade + aspect + consistency rule.",
    ref:"Prompt P6.4 · the formula"
  },
  {
    seg:"Segment 4 · Video",
    q:"Smart way to handle resolution so you don't waste time and credits?",
    options:[
      "Always finalise at the lowest resolution",
      "Test at low resolution, finalise at high",
      "Render everything at max from the start",
      "Resolution doesn't affect credits"
    ],
    correct:1,
    explain:"Test low (fast, cheap) to lock the shot, then finalise high. Higher resolution is slower and costs more credits — only pay for it once you've approved the result.",
    ref:"Segment 4 · settings that matter"
  },
  {
    seg:"Segment 4 · Video",
    q:"What's the 'pro move' that blends your real footage with AI?",
    options:[
      "Speed up the real clip 2×",
      "Add a black-and-white filter",
      "Let Seedance continue real footage seamlessly — an invisible cut",
      "Overlay stock music"
    ],
    correct:2,
    explain:"Start with real filmed footage and let Seedance continue it in the same light, grade and motion so the cut is invisible. One shoot becomes a week of content.",
    ref:"Prompt P6.3 · blend real + AI"
  },
  {
    seg:"Segment 5 · Content Factory",
    q:"What is the correct order of the 5-stage Content Factory?",
    options:[
      "Ads → Cost → Calendar → Research → Production",
      "Research → Calendar → Batch production → Meta Ads → Cost analysis",
      "Calendar → Research → Cost → Production → Ads",
      "Production → Ads → Research → Calendar → Cost"
    ],
    correct:1,
    explain:"Research feeds the calendar, the calendar feeds production, production feeds ads, and ads feed the numbers. A system, not a trick.",
    ref:"Prompts P7.1–P7.5"
  },
  {
    seg:"Segment 6 · Lock it in",
    q:"What's the single most important field in your content tracker?",
    options:[
      "The date column",
      "The hashtag column",
      "The STATUS column (Idea / Generating / Ready / Posted / Boosted)",
      "The platform column"
    ],
    correct:2,
    explain:"STATUS is what stops your automation regenerating the same video 50 times and burning credits. No status column = runaway robot. This is the fix for Mistake #4.",
    ref:"Prompt P8.2 · the tracker"
  },
  {
    seg:"Segment 7 · Mistakes",
    q:"Before producing 100 videos, what should you always do first?",
    options:[
      "Generate all 100, then review",
      "Test one, approve it, then batch",
      "Ask a friend to pick the topics",
      "Post immediately, edit later"
    ],
    correct:1,
    explain:"Test one → approve → then scale. Batching at full volume before testing one gives you 100 bad videos instead of one good test. This is Mistake #7.",
    ref:"Segment 7 · the 7 mistakes"
  }
];

let idx=0, score=0, locked=false;
const screen=document.getElementById('screen');
const bar=document.getElementById('bar');

function setBar(n){ bar.style.width = (n/QUESTIONS.length*100)+'%'; }

function renderStart(){
  setBar(0);
  screen.className='card fade';
  screen.innerHTML=`
    <div class="start">
      <div class="kicker">Live Knowledge Check</div>
      <h1 class="bebas">AI CONTENT<br>MAST<span class="o">E</span>RY</h1>
      <p class="sub">Fifteen questions on everything we built today — the studio, the models, the one-prompt brand, video, the content factory and the mistakes that quietly kill results.</p>
      <div class="meta">
        <div><b class="bebas">15</b>QUESTIONS</div>
        <div><b class="bebas">7</b>SEGMENTS</div>
        <div><b class="bebas">∞</b>RETAKES</div>
      </div>
      <button class="btn" onclick="startQuiz()">Start the quiz →</button>
    </div>`;
}

function startQuiz(){ idx=0; score=0; renderQuestion(); }

function renderQuestion(){
  locked=false;
  const item=QUESTIONS[idx];
  setBar(idx);
  screen.className='card fade';
  const opts=item.options.map((o,i)=>`
    <button class="opt" data-i="${i}" onclick="choose(${i})">
      <span class="key bebas">${String.fromCharCode(65+i)}</span>
      <span class="txt">${o}</span>
      <span class="mark"></span>
    </button>`).join('');
  screen.innerHTML=`
    <div class="qmeta">
      <span class="qcount">Question ${idx+1} / ${QUESTIONS.length}</span>
      <span class="qseg">${item.seg}</span>
    </div>
    <div class="qtext">${item.q}</div>
    <div class="options" id="opts">${opts}</div>
    <div class="explain" id="explain"></div>
    <div class="nav">
      <span class="hint">Tap an answer · keys A–D or 1–4</span>
      <button class="btn" id="next" disabled onclick="next()">${idx===QUESTIONS.length-1?'See results →':'Next question →'}</button>
    </div>`;
}

function choose(i){
  if(locked) return;
  locked=true;
  const item=QUESTIONS[idx];
  const correct=item.correct;
  if(i===correct) score++;
  const optsWrap=document.getElementById('opts');
  optsWrap.classList.add('locked');
  [...optsWrap.children].forEach((el,j)=>{
    const mark=el.querySelector('.mark');
    if(j===correct){el.classList.add('correct');mark.textContent='✓ Correct';}
    else if(j===i){el.classList.add('wrong');mark.textContent='✗ Your pick';}
    else{el.classList.add('dim');}
  });
  const ex=document.getElementById('explain');
  const right = i===correct;
  ex.innerHTML=`
    <div class="et">${right?'✓ Nailed it':'→ Here’s the answer'}</div>
    <p><span class="verdict">${item.options[correct]}.</span> ${item.explain}</p>
    <div class="ref">Reference · ${item.ref}</div>`;
  ex.classList.add('show');
  document.getElementById('next').disabled=false;
}

function next(){
  if(idx<QUESTIONS.length-1){ idx++; renderQuestion(); }
  else{ renderResults(); }
}

function renderResults(){
  setBar(QUESTIONS.length);
  const pct=Math.round(score/QUESTIONS.length*100);
  let title, line;
  if(pct>=90){title='AI Content <span class="o">Operator</span>';line='Outstanding. You can run this system for any brand, today.';}
  else if(pct>=70){title='Strong <span class="o">Operator</span>';line='Great grasp of the workflow. Skim the few you missed and you’re set.';}
  else if(pct>=50){title='Getting <span class="o">Sharp</span>';line='Solid start. Revisit the segments you missed in the workbook and run it again.';}
  else{title='Time to <span class="o">Rewatch</span>';line='No worries — open the workbook, re-run the prompts, and take it again.';}
  const deg=pct*3.6;
  screen.className='card fade';
  screen.innerHTML=`
    <div class="results">
      <div class="kicker">Your result</div>
      <div class="score-ring" style="border-radius:50%;background:conic-gradient(var(--orange) ${deg}deg, rgba(255,255,255,.08) ${deg}deg);padding:10px;">
        <div style="position:absolute;inset:10px;border-radius:50%;background:var(--ink);"></div>
        <div class="scorenum"><b class="bebas">${score}/${QUESTIONS.length}</b><span>${pct}% correct</span></div>
      </div>
      <h2 class="bebas">${title}</h2>
      <p class="verdict-line">${line}</p>
      <div class="cta-box">
        <div class="bebas">Want this built FOR your business?</div>
        <p>That’s what winsym.ai does — we build your "Company Brain" so the whole system runs without you. Book a free 30-minute discovery call.</p>
        <a class="btn" href="https://winsym-ai.vercel.app/#contact" target="_blank" rel="noopener">Book a discovery call →</a>
      </div>
      <div class="btns">
        <button class="btn ghost" onclick="startQuiz()">↺ Retake quiz</button>
      </div>
    </div>`;
}

// keyboard
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['1','2','3','4','a','b','c','d'].includes(k) && !locked && document.getElementById('opts')){
    const map={'1':0,'2':1,'3':2,'4':3,'a':0,'b':1,'c':2,'d':3};
    const el=document.querySelector(`.opt[data-i="${map[k]}"]`);
    if(el) choose(map[k]);
  }
  if((e.key==='Enter'||e.key===' ')){
    const nx=document.getElementById('next');
    if(nx && !nx.disabled){ e.preventDefault(); next(); }
    else if(document.querySelector('.start')){ e.preventDefault(); startQuiz(); }
  }
});

renderStart();
</script>
</body>
</html>
